name: Deploy Function App
run-name: Deploy ${{ inputs.function-name }}

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET version"
        required: false
        default: "10.0.x"
        type: string

      project-path:
        description: "path to .csproj"
        required: true
        type: string

      function-name:
        description: "name of function app in azure"
        required: true
        type: string

      staging-slot-name:
        description: "Optional deployment to staging slot"
        required: false
        default: ""
        type: string
              
permissions:
  contents: read

env:
  PUBLISH_PATH: "./publish_output"

jobs:
  build_test:
    uses: ./.github/workflows/github-action-workflow.yml
    with:
      dotnet-version: ${{ inputs.dotnet-version }}
      project-path: ${{ inputs.project-path }}
    
  deploy:
    runs-on: ubuntu-latest
    needs: build_test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project-path }}

      - name: Publish Function App
        run: dotnet publish ${{ inputs.project-path }} --configuration Release --output ${{ env.PUBLISH_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.JAMES_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Staging
        if: ${{ inputs.staging-slot-name != '' }}
        uses: Azure/functions-action@v1.5.3
        with:
          app-name: ${{ inputs.function-name }}
          slot-name: ${{ inputs.staging-slot-name }}
          package: ${{ env.PUBLISH_PATH }}

      - name: Deploy to Production
        if: ${{ inputs.staging-slot-name == '' }}
        uses: Azure/functions-action@v1.5.3
        with:
          app-name: ${{ inputs.function-name }}
          package: ${{ env.PUBLISH_PATH }}
